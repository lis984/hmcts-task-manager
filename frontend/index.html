<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HMCTS Task Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="govuk-header" role="banner">
    <div class="govuk-header__container">
      <div class="govuk-header__logo">
        <span class="govuk-header__logotype">
          <svg class="crown" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 97" focusable="false" aria-hidden="true">
            <path fill="currentColor" fill-rule="evenodd" d="M25 30.2c3.5 1.5 7.7-.2 9.1-3.7 1.5-3.6-.2-7.8-3.9-9.2-3.5-1.3-7.5.2-9.1 3.9-1.4 3.5.3 7.5 3.9 9zM9 39.5c3.5 1.5 7.7-.2 9.1-3.7 1.5-3.6-.2-7.8-3.9-9.2-3.5-1.3-7.5.2-9.1 3.9-1.4 3.5.3 7.5 3.9 9zM4.4 57.2c3.5 1.5 7.7-.2 9.1-3.7 1.5-3.6-.2-7.8-3.9-9.2-3.5-1.3-7.5.2-9.1 3.9-1.4 3.5.3 7.5 3.9 9zm38.3-21.4c3.5 1.5 7.7-.2 9.1-3.7 1.5-3.6-.2-7.8-3.9-9.2-3.5-1.3-7.5.2-9.1 3.9-1.4 3.5.3 7.5 3.9 9zm64.4-5.6c-3.5 1.5-7.7-.2-9.1-3.7-1.5-3.6.2-7.8 3.9-9.2 3.5-1.3 7.5.2 9.1 3.9 1.4 3.5-.3 7.5-3.9 9zm15.9 9.3c-3.5 1.5-7.7-.2-9.1-3.7-1.5-3.6.2-7.8 3.9-9.2 3.5-1.3 7.5.2 9.1 3.9 1.4 3.5-.3 7.5-3.9 9zm4.7 17.7c-3.5 1.5-7.7-.2-9.1-3.7-1.5-3.6.2-7.8 3.9-9.2 3.5-1.3 7.5.2 9.1 3.9 1.4 3.5-.3 7.5-3.9 9zM89.3 35.8c-3.5 1.5-7.7-.2-9.1-3.7-1.5-3.6.2-7.8 3.9-9.2 3.5-1.3 7.5.2 9.1 3.9 1.4 3.5-.3 7.5-3.9 9zM69.7 17.7l8.9 4.7V9.3l-8.9 2.8c-.2-.3-.5-.6-.9-.9L72.4 0H59.6l3.5 11.2c-.3.3-.6.5-.9.9l-8.8-2.8v13.1l8.8-4.7c.3.3.6.7.9.9l-5 15.4v.1h15.9v-.1l-5-15.4c.3-.2.6-.6.7-.9zM64 62.7v-.2H48.7v.2l-1.9 5.9H28.6l.5-3.7 24.5-4.4 9.5-26.7h-6.7l-9.4 26.2-14.9 2.7.9-6.7h8.9l7.2-19.8h-5.5L38 53.6H28.3l4.4-30.5 29.8-5.4.8 2.3H69l-1-2.9 1.4-.3 1 2.9h6.4L72.7 13l30.2 5.5 4.4 30.5H97.6l-5.3-17.1h-5.5l7.2 19.8h8.9l.9 6.7-15-2.7-9.4-26.2h-6.7l9.5 26.7 24.5 4.4.5 3.7H88.8l-1.9-5.9z"/>
          </svg>
        </span>
      </div>
      <div class="govuk-header__content">
        <span class="govuk-header__service-name">HMCTS Task Manager</span>
      </div>
    </div>
  </header>

  <div class="govuk-width-container">
    <main class="govuk-main-wrapper" id="main-content">

      <div id="notification" class="govuk-notification-banner" role="region" aria-label="Notice" style="display:none;">
        <div class="govuk-notification-banner__header">
          <h2 class="govuk-notification-banner__title">Notice</h2>
        </div>
        <div class="govuk-notification-banner__content">
          <p class="govuk-notification-banner__heading" id="notification-msg"></p>
        </div>
      </div>

      <div class="govuk-grid-row">
        <div class="govuk-grid-column-two-thirds">
          <h1 class="govuk-heading-xl">Task Manager</h1>
        </div>
        <div class="govuk-grid-column-one-third" style="text-align:right; padding-top: 24px;">
          <button class="govuk-button" id="new-task-btn">+ New Task</button>
        </div>
      </div>

      <!-- FILTER BAR -->
      <div class="filter-bar">
        <label class="govuk-label govuk-!-margin-bottom-0" for="status-filter">Filter by status:</label>
        <select class="govuk-select" id="status-filter">
          <option value="">All tasks</option>
          <option value="pending">Pending</option>
          <option value="in_progress">In Progress</option>
          <option value="completed">Completed</option>
        </select>
      </div>

      <!-- TASK LIST -->
      <div id="task-list">
        <p class="govuk-body" id="loading-msg">Loading tasks...</p>
      </div>

      <!-- CREATE / EDIT MODAL -->
      <div id="modal-overlay" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-box">
          <h2 class="govuk-heading-l" id="modal-title">New Task</h2>

          <div id="form-error" class="govuk-error-summary" style="display:none;">
            <h2 class="govuk-error-summary__title">There is a problem</h2>
            <ul class="govuk-list govuk-error-summary__list" id="form-error-list"></ul>
          </div>

          <div class="govuk-form-group" id="title-group">
            <label class="govuk-label" for="task-title">Title <span class="govuk-required">*</span></label>
            <input class="govuk-input" type="text" id="task-title" maxlength="255" autocomplete="off" />
          </div>

          <div class="govuk-form-group">
            <label class="govuk-label" for="task-description">Description <span class="govuk-hint">(optional)</span></label>
            <textarea class="govuk-textarea" id="task-description" rows="3"></textarea>
          </div>

          <div class="govuk-form-group" id="status-group">
            <label class="govuk-label" for="task-status">Status <span class="govuk-required">*</span></label>
            <select class="govuk-select" id="task-status">
              <option value="pending">Pending</option>
              <option value="in_progress">In Progress</option>
              <option value="completed">Completed</option>
            </select>
          </div>

          <div class="govuk-form-group" id="due-group">
            <label class="govuk-label" for="task-due">Due date and time <span class="govuk-required">*</span></label>
            <input class="govuk-input" type="datetime-local" id="task-due" />
          </div>

          <div class="modal-actions">
            <button class="govuk-button" id="save-task-btn">Save task</button>
            <button class="govuk-button govuk-button--secondary" id="cancel-modal-btn">Cancel</button>
          </div>
        </div>
      </div>

      <!-- DELETE CONFIRMATION MODAL -->
      <div id="delete-overlay" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true">
        <div class="modal-box modal-box--narrow">
          <h2 class="govuk-heading-m">Confirm deletion</h2>
          <p class="govuk-body">Are you sure you want to delete <strong id="delete-task-title"></strong>? This action cannot be undone.</p>
          <div class="modal-actions">
            <button class="govuk-button govuk-button--warning" id="confirm-delete-btn">Delete task</button>
            <button class="govuk-button govuk-button--secondary" id="cancel-delete-btn">Cancel</button>
          </div>
        </div>
      </div>

    </main>
  </div>

  <footer class="govuk-footer">
    <div class="govuk-width-container">
      <div class="govuk-footer__meta">
        <div class="govuk-footer__meta-item govuk-footer__meta-item--grow">
          <span class="govuk-footer__licence-description">
            Built for HMCTS — Developer Technical Test
          </span>
        </div>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
